server:
  port: ${PORT:8080}

spring:
  application:
    name: line-relay-service

line:
  channel-secret: ${LINE_CHANNEL_SECRET:}
  channel-access-token: ${LINE_CHANNEL_ACCESS_TOKEN:}
  api-base: ${LINE_API_BASE:https://api.line.me}

logging:
  level:
    root: INFO
    com.zack.linerelay: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%thread] %logger{36} - %msg%n"
